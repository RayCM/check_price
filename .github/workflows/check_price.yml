name: Check Flight Prices

on:
  schedule:
    - cron: '0 0 * * *'  # 每天午夜運行
  workflow_dispatch:  # 允許手動觸發

jobs:
  check-prices:
    runs-on: ubuntu-latest

    env:
      LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
      LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install ChromeDriver
      run: |
        CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
        CHROMEDRIVER_VERSION=137.0.7151.68
        wget -q https://chromedriver.storage.googleapis.com/$CHROMEDRIVER_VERSION/chromedriver-linux64.zip
        unzip chromedriver-linux64.zip
        sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
        sudo chmod +x /usr/local/bin/chromedriver
        chromedriver --version

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium linebot-sdk psutil

    - name: Run check_price.py
      run: |
        python check_price.py | tee run.log

    - name: Upload artifacts
      if: always()
      uses: actions(upload-artifact@v4
      with:
        name: debug-files
        path: |
          run.log
          screenshot.png
          page_debug.html