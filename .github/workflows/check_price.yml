name: Run Check Price Script

on:
  schedule:
    - cron: '0 * * * *'  # 每小時整點執行（UTC 時間）
  workflow_dispatch:  # 允許手動觸發

jobs:
  run-check-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 使用 Python 3.11
      - name: Install Chrome and ChromeDriver
        run: |
          # 更新套件列表並清理快取
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends google-chrome-stable
          # 獲取 Chrome 版本並下載匹配的 ChromeDriver
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
          CHROMEDRIVER_VERSION=$(curl -sS "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_$CHROME_VERSION")
          if [ -z "$CHROMEDRIVER_VERSION" ]; then
            echo "無法獲取 ChromeDriver 版本，退出"
            exit 1
          fi
          wget -q "https://chromedriver.storage.googleapis.com/$CHROMEDRIVER_VERSION/chromedriver_linux64.zip"
          unzip chromedriver_linux64.zip
          sudo mv chromedriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/chromedriver
          # 驗證 Chrome 和 ChromeDriver
          google-chrome --version
          chromedriver --version
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium line-bot-sdk==3.11.0 requests
      - name: Run check_price.py
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
        run: python check_price.py
      - name: Upload debug artifacts
        if: failure()  # 僅在失敗時上傳
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            screenshot.png
            page_debug.html
            run.log
          retention-days: 5