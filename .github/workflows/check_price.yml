name: Test Upload Artifact

on: [push]

jobs:
  test-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "test" > test.txt
      - uses: actions/upload-artifact@v4
        with:
          name: test-artifact
          path: test.txt
          retention-days: 5  # 可選：設定 artifact 保留 5 天｀