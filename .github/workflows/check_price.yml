name: Check Flight Price

on:
  schedule:
    - cron: '0 * * * *'  # 每小時執行一次
  workflow_dispatch:      # 允許手動執行

jobs:
  run-check:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip xvfb
        wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt install -y ./google-chrome-stable_current_amd64.deb

    - name: Install ChromeDriver v137
      run: |
        wget -q https://storage.googleapis.com/chrome-for-testing-public/137.0.7151.55/linux64/chromedriver-linux64.zip
        unzip chromedriver-linux64.zip
        sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
        sudo chmod +x /usr/local/bin/chromedriver

    - name: Run check_price.py
      id: runscript
      env:
        LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
      run: |
        set +e
        python check_price.py 2>&1 | tee run.log
        status=${PIPESTATUS[0]}
        if [ $status -ne 0 ]; then
          echo "script_failed=true" >> $GITHUB_ENV
          echo "script_failed=true" >> $GITHUB_OUTPUT
        else
          echo "script_failed=false" >> $GITHUB_ENV
          echo "script_failed=false" >> $GITHUB_OUTPUT
        fi

    - name: 壓縮除錯檔案
      if: env.script_failed == 'true'
      run: |
        files=""
        [ -f screenshot.png ] && files+=" screenshot.png"
        [ -f page_debug.html ] && files+=" page_debug.html"
        if [ -n "$files" ]; then
          zip debug-info.zip $files
        fi

    - name: 上傳除錯檔案（debug-info.zip）
      if: env.script_failed == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: debug-info
        path: debug-info.zip
        if-no-files-found: ignore

    - name: 上傳執行輸出 log（run.log）
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: run-log
        path: run.log
        if-no-files-found: warn
