name: Check Price

on:
  schedule:
    - cron: '0 * * * *'   # 每小時執行一次，你可以依需求調整
  workflow_dispatch:

jobs:
  check_price:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium line-bot-sdk

      - name: Run price check script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
        run: |
          set +e
          python check_price.py 2>&1 | tee run.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            echo "script_failed=true" >> $GITHUB_ENV
            echo "script_failed=true" >> $GITHUB_OUTPUT
          else
            echo "script_failed=false" >> $GITHUB_ENV
            echo "script_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v2
        with:
          name: debug-artifacts
          path: |
            screenshot.png
            page_debug.html
            run.log
