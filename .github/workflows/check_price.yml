name: Run Check Price Script

on:
  schedule:
    - cron: '0 * * * *'  # 每小時整點執行（UTC 時間）
  workflow_dispatch:  # 允許手動觸發

jobs:
  run-check-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome and ChromeDriver
        run: |
          # 更新套件列表並忽略非關鍵錯誤
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends google-chrome-stable || true
          # 獲取 Chrome 版本
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+' || echo "136.0.7103.113")
          echo "Chrome version: $CHROME_VERSION"
          # 設置 ChromeDriver 版本為 Chrome 版本
          CHROMEDRIVER_VERSION=$CHROME_VERSION
          echo "Using ChromeDriver version: $CHROMEDRIVER_VERSION"
          # 下載 ChromeDriver
          wget -q --tries=3 "[invalid url, do not cite] -O chromedriver.zip || { echo "下載 ChromeDriver 失敗"; exit 1; }
          # 解壓 ChromeDriver
          unzip chromedriver.zip || { echo "解壓 ChromeDriver 失敗"; exit 1; }
          # 移動 ChromeDriver
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/ || { echo "移動 ChromeDriver 失敗"; exit 1; }
          sudo chmod +x /usr/local/bin/chromedriver
          # 清理臨時檔案
          rm -rf chromedriver.zip chromedriver-linux64
          # 驗證版本
          google-chrome --version
          chromedriver --version
        shell: /usr/bin/bash -e {0}
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium line-bot-sdk==3.11.0 requests
      - name: Run check_price.py
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
        run: python check_price.py
      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            screenshot.png
            page_debug.html
            run.log
          retention-days: 5
      - name: Notify on failure
        if: failure()
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
        run: |
          python -c "from linebot.v3.messaging import MessagingApi, Configuration, ApiClient; from linebot.v3.messaging.models import TextMessage, PushMessageRequest; configuration = Configuration(access_token='$LINE_ACCESS_TOKEN'); line_bot_api = MessagingApi(ApiClient(configuration)); req = PushMessageRequest(to='$LINE_GROUP_ID', messages=[TextMessage(text='⚠️ GitHub Actions 執行失敗')]); line_bot_api.push_message(req)"