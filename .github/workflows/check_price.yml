name: Run Check Price Script

on:
  schedule:
    - cron: '0 * * * *'  # 每小時整點執行（UTC 時間）
  workflow_dispatch:  # 允許手動觸發

jobs:
  run-check-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome and ChromeDriver
        run: |
          # 更新套件列表並忽略非關鍵錯誤
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends google-chrome-stable || true
          # 獲取 Chrome 版本
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+' || echo "136.0.7103")
          echo "Chrome version: $CHROME_VERSION"
          # 嘗試獲取 ChromeDriver 版本
          CHROMEDRIVER_VERSION=$(curl -sS "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_$CHROME_VERSION" || echo "")
          if [ -z "$CHROMEDRIVER_VERSION" ]; then
            echo "無法獲取 ChromeDriver 版本，嘗試使用完整 Chrome 版本"
            FULL_CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
            CHROMEDRIVER_VERSION=$FULL_CHROME_VERSION
            echo "使用後備 ChromeDriver 版本: $CHROMEDRIVER_VERSION"
          fi
          echo "ChromeDriver version: $CHROMEDRIVER_VERSION"
          # 下載並安裝 ChromeDriver
          wget -q --tries=3 "https://chromedriver.storage.googleapis.com/$CHROMEDRIVER_VERSION/chromedriver_linux64.zip" || { echo "下載 ChromeDriver 失敗"; exit 1; }
          unzip chromedriver_linux64.zip || { echo "解壓 ChromeDriver 失敗"; exit 1; }
          sudo mv chromedriver /usr/local/bin/ || { echo "移動 ChromeDriver 失敗"; exit 1; }
          sudo chmod +x /usr/local/bin/chromedriver
          # 驗證版本
          google-chrome --version
          chromedriver --version
        shell: /usr/bin/bash -e {0}
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium line-bot-sdk==3.11.0 requests
      - name: Run check_price.py
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
        run: python check_price.py
      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            screenshot.png
            page_debug.html
            run.log
          retention-days: 5